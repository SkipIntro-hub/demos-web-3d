<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>100 Boulder Rd — Escaneo 3D</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; }
  body {
    font-family: system-ui,-apple-system,sans-serif;
    background: radial-gradient(circle at 50% 35%, #243447 0%, #0e1620 75%);
    touch-action:none;
  }
  #frameTop,#frameBottom { position:fixed; left:0; right:0; height:5px; z-index:10; }
  #frameTop { top:0; background:linear-gradient(90deg,#e0a458,#3a6e8f); }
  #frameBottom { bottom:0; background:linear-gradient(90deg,#3a6e8f,#e0a458); }
  #head { position:fixed; top:22px; left:20px; z-index:10; max-width:80%; pointer-events:none; }
  #eyebrow { color:#e0a458; font-size:10px; letter-spacing:2.5px; text-transform:uppercase; margin-bottom:5px; }
  #head h1 { color:#eef2f5; font-size:21px; line-height:1.1; font-weight:600; }
  #head p { color:#8ea3b5; font-size:12px; margin-top:8px; line-height:1.5; }
  canvas { display:block; }
  #loader {
    position:fixed; inset:0; display:flex; flex-direction:column; gap:12px;
    align-items:center; justify-content:center;
    z-index:20; background:#0e1620; color:#8ea3b5; font-size:14px;
    text-align:center; padding:30px; transition:opacity .5s;
  }
  #loader.hide { opacity:0; pointer-events:none; }
  #loader small { color:#5d6d7e; font-size:12px; max-width:280px; line-height:1.5; }
  #badge {
    position:fixed; bottom:18px; left:20px; z-index:10;
    color:#6e8497; font-size:11px; line-height:1.5;
  }
</style>
</head>
<body>
<div id="frameTop"></div>
<div id="head">
  <div id="eyebrow">Escaneo Polycam · optimizado</div>
  <h1>100 Boulder Rd, Newton</h1>
  <p>Arrastrá para orbitar. Pellizcá para acercarte.</p>
</div>
<div id="loader">
  <div id="lmsg">Cargando modelo 3D…</div>
  <small>El visor y casa-optimizada.glb deben estar en la misma carpeta, servidos desde un hosting o servidor local.</small>
</div>
<div id="badge">21 MB &rarr; 1,7 MB &nbsp;&middot;&nbsp; 282k &rarr; 36k triangulos</div>
<div id="frameBottom"></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

const loaderEl = document.getElementById("loader");
const lmsg = document.getElementById("lmsg");

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 1000);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const d1 = new THREE.DirectionalLight(0xffffff, 1.2); d1.position.set(5,8,5); scene.add(d1);
const d2 = new THREE.DirectionalLight(0xaaccff, 0.5); d2.position.set(-5,3,-5); scene.add(d2);
scene.add(new THREE.HemisphereLight(0xcfe0ee, 0x33302a, 0.6));

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

const loader = new GLTFLoader();

loader.load(
  "casa-optimizada.glb",
  (gltf)=>{
    const model = gltf.scene;
    scene.add(model);
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center);
    const maxDim = Math.max(size.x, size.y, size.z) || 1;
    const dist = maxDim * 1.4;
    camera.position.set(dist*0.7, dist*0.5, dist*0.7);
    camera.lookAt(0,0,0);
    controls.target.set(0,0,0);
    controls.minDistance = maxDim*0.15;
    controls.maxDistance = maxDim*3;
    controls.update();
    loaderEl.classList.add("hide");
  },
  (xhr)=>{
    if(xhr.total) lmsg.textContent = "Cargando... " + Math.round(xhr.loaded/xhr.total*100) + "%";
  },
  (err)=>{
    lmsg.textContent = "No se pudo cargar el modelo.";
    console.error(err);
  }
);

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
