<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>100 Boulder Rd — Recorrido</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; }
  body { font-family: system-ui,-apple-system,sans-serif; background:#0e1620; }
  canvas { display:block; }
  #frameTop,#frameBottom { position:fixed; left:0; right:0; height:5px; z-index:10; pointer-events:none; }
  #frameTop { top:0; background:linear-gradient(90deg,#e0a458,#3a6e8f); }
  #frameBottom { bottom:0; background:linear-gradient(90deg,#3a6e8f,#e0a458); }
  #start {
    position:fixed; inset:0; z-index:30; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:30px;
    background:radial-gradient(circle at 50% 35%, #243447 0%, #0e1620 75%);
    cursor:pointer; transition:opacity .4s;
  }
  #start.hide { opacity:0; pointer-events:none; }
  #start .eyebrow { color:#e0a458; font-size:11px; letter-spacing:3px; text-transform:uppercase; margin-bottom:10px; }
  #start h1 { color:#eef2f5; font-size:30px; font-weight:600; margin-bottom:6px; }
  #start h2 { color:#8ea3b5; font-size:15px; font-weight:400; margin-bottom:30px; }
  #cta { background:#e0a458; color:#0e1620; font-weight:600; font-size:15px; padding:14px 32px; border-radius:6px; margin-bottom:28px; }
  .keys { display:flex; gap:26px; color:#6e8497; font-size:13px; flex-wrap:wrap; justify-content:center; max-width:520px; }
  .keys b { color:#cfe0ee; display:block; font-size:15px; margin-bottom:3px; }
  #loading { position:fixed; inset:0; z-index:40; display:flex; align-items:center; justify-content:center; background:#0e1620; color:#8ea3b5; font-size:14px; }
  #loading.hide { display:none; }
  #hud { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:10; color:#6e8497; font-size:12px; letter-spacing:1px; background:rgba(12,22,32,.6); padding:8px 18px; border-radius:20px; pointer-events:none; opacity:0; transition:opacity .3s; }
  #hud.show { opacity:1; }
  #crosshair { position:fixed; top:50%; left:50%; width:6px; height:6px; margin:-3px 0 0 -3px; border-radius:50%; background:rgba(224,164,88,.8); z-index:10; pointer-events:none; opacity:0; transition:opacity .3s; }
  #crosshair.show { opacity:1; }
</style>
</head>
<body>
<div id="frameTop"></div>
<div id="loading">Cargando casa…</div>
<div id="start" class="hide">
  <div class="eyebrow">Escaneo Polycam · recorrido en primera persona</div>
  <h1>100 Boulder Rd, Newton</h1>
  <h2>Caminá la casa como en un videojuego</h2>
  <div id="cta">Clic para entrar</div>
  <div class="keys">
    <div><b>W A S D</b>moverte</div>
    <div><b>Mouse</b>mirar</div>
    <div><b>Shift</b>correr</div>
    <div><b>Espacio</b>subir</div>
    <div><b>C</b>bajar</div>
    <div><b>Esc</b>salir</div>
  </div>
</div>
<div id="crosshair"></div>
<div id="hud">WASD moverte · Mouse mirar · Esc salir</div>
<div id="frameBottom"></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e1620);
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 1000);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.85));
const d1 = new THREE.DirectionalLight(0xffffff, 1.1); d1.position.set(5,8,5); scene.add(d1);
const d2 = new THREE.DirectionalLight(0xaaccff, 0.5); d2.position.set(-5,3,-5); scene.add(d2);
scene.add(new THREE.HemisphereLight(0xcfe0ee, 0x33302a, 0.6));

const startEl = document.getElementById("start");
const loadingEl = document.getElementById("loading");
const hud = document.getElementById("hud");
const crosshair = document.getElementById("crosshair");

let modelReady = false, modelRadius = 5;

const loader = new GLTFLoader();
loader.load("casa-optimizada.glb", (gltf)=>{
  const model = gltf.scene;
  scene.add(model);
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  model.position.sub(center);
  modelRadius = Math.max(size.x, size.y, size.z) * 0.5;
  camera.position.set(0, 0, 0);
  modelReady = true;
  loadingEl.classList.add("hide");
  startEl.classList.remove("hide");
}, undefined, (e)=>{ loadingEl.textContent = "No se pudo cargar el modelo."; console.error(e); });

// ── Control de cámara propio (yaw/pitch) — sin PointerLockControls,
//    para no depender de su API que cambia entre versiones de three.
let yaw = 0, pitch = 0;
let locked = false;
const euler = new THREE.Euler(0,0,0,"YXX".replace("X","Y").slice(0,3)); // 'YXZ'

const canvas = renderer.domElement;

startEl.addEventListener("click", ()=>{
  if(!modelReady) return;
  canvas.requestPointerLock();
});

document.addEventListener("pointerlockchange", ()=>{
  locked = (document.pointerLockElement === canvas);
  if(locked){
    startEl.classList.add("hide");
    hud.classList.add("show"); crosshair.classList.add("show");
  } else {
    startEl.classList.remove("hide");
    hud.classList.remove("show"); crosshair.classList.remove("show");
  }
});

document.addEventListener("mousemove", (e)=>{
  if(!locked) return;
  const sens = 0.0022;
  yaw   -= e.movementX * sens;
  pitch -= e.movementY * sens;
  const lim = Math.PI/2 - 0.05;
  pitch = Math.max(-lim, Math.min(lim, pitch));
});

// teclado
const keys = {};
addEventListener("keydown", e=>{ keys[e.code]=true; });
addEventListener("keyup",   e=>{ keys[e.code]=false; });
addEventListener("blur", ()=>{ for(const k in keys) keys[k]=false; });

const vel = new THREE.Vector3();
const forward = new THREE.Vector3();
const right = new THREE.Vector3();
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  // aplicar orientación
  euler.set(pitch, yaw, 0, "YXZ");
  camera.quaternion.setFromEuler(euler);

  if(locked){
    const fast = (keys["ShiftLeft"]||keys["ShiftRight"]) ? 3 : 1;
    const speed = 1.2 * modelRadius * 0.25 * fast;

    // vectores de movimiento horizontal a partir del yaw (no del pitch)
    forward.set(-Math.sin(yaw), 0, -Math.cos(yaw));
    right.set(Math.cos(yaw), 0, -Math.sin(yaw));

    const move = new THREE.Vector3();
    if(keys["KeyW"]||keys["ArrowUp"])    move.add(forward);
    if(keys["KeyS"]||keys["ArrowDown"])  move.sub(forward);
    if(keys["KeyD"]||keys["ArrowRight"]) move.add(right);
    if(keys["KeyA"]||keys["ArrowLeft"])  move.sub(right);
    if(move.lengthSq()>0) move.normalize();

    let vy = 0;
    if(keys["Space"]) vy += 1;
    if(keys["KeyC"])  vy -= 1;

    camera.position.addScaledVector(move, speed * dt);
    camera.position.y += vy * speed * dt;
  }

  renderer.render(scene, camera);
}
animate();

addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
